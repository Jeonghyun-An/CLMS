version: "3.9"

x-contract-net: &contract-net
  networks:
    - contract-net

x-fastapi-common-env: &fastapi-common-env
  IS_DOCKER: "true"
  PYTHONUNBUFFERED: "1"

  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: ${POSTGRES_DB:-contract_review}
  DB_USER: ${POSTGRES_USER:-admin}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-password}

  REDIS_URL: "redis://redis:6379/0"

  MINIO_ENDPOINT: "minio:9000"
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  MINIO_SECURE: "false"

  MILVUS_HOST: "milvus"
  MILVUS_PORT: "19530"

  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password123}

  VLLM_BASE_URL: ${VLLM_BASE_URL:-http://host.docker.internal:18080/v1}
  VLLM_MODEL: ${VLLM_SERVED_NAME:-gemma-3-12b}

  EMBEDDING_MODEL_NAME: "BAAI/bge-m3"
  EMBEDDING_BATCH_SIZE: "32"
  EMBEDDING_MAX_LENGTH: "512"
  PADDLEOCR_MODEL_DIR: "/models/paddleocr"

  CORS_ALLOW_ORIGINS: "*"

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: contract-etcd
    environment:
      ETCD_DATA_DIR: "/etcd"
      ETCD_AUTO_COMPACTION_RETENTION: "1"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
      ETCD_ENABLE_V2: "true"
      ETCD_LOG_LEVEL: "info"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_PEER_URLS: "http://0.0.0.0:2380"
      ETCD_INITIAL_ADVERTISE_PEER_URLS: "http://etcd:2380"
      ETCD_INITIAL_CLUSTER: "default=http://etcd:2380"
      ETCD_NAME: "default"
      ETCDCTL_API: "3"
    volumes:
      - contract_etcd_data:/etcd
    <<: *contract-net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: contract-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - contract_minio_data:/data
    ports:
      - "21000:9000"
      - "21001:9001"
    <<: *contract-net
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: contract-minio-init
    <<: *contract-net
    depends_on:
      - minio
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: "contract-bucket"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
      mc mb -p myminio/$${MINIO_BUCKET} || true &&
      mc anonymous set none myminio/$${MINIO_BUCKET} || true &&
      echo '[minio-init] bucket ensured: ' $${MINIO_BUCKET}
    restart: "no"

  milvus:
    image: milvusdb/milvus:v2.4.6
    container_name: contract-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: "etcd:2379"
      MINIO_ADDRESS: "minio:9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: "contract-bucket"
    volumes:
      - contract_milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
      - minio-init
    <<: *contract-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: contract-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-contract_review}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "15432:5432"
    volumes:
      - contract_postgres_data:/var/lib/postgresql/data
    <<: *contract-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: contract-redis
    ports:
      - "16379:6379"
    volumes:
      - contract_redis_data:/data
    <<: *contract-net
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26
    container_name: contract-neo4j
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password123}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_default__listen__address: 0.0.0.0
    volumes:
      - contract_neo4j_data:/data
      - contract_neo4j_logs:/logs
      - contract_neo4j_plugins:/plugins
    <<: *contract-net
    restart: unless-stopped

  fastapi:
    image: landsoftdocker/clms-fastapi:latest
    container_name: contract-fastapi
    <<: *contract-net
    shm_size: "4g"
    gpus: all
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *fastapi-common-env
      CUDA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    volumes:
      - /data/models/.hf-cache:/models:rw
    ports:
      - "18002:8000"
    depends_on:
      - postgres
      - milvus
      - minio
      - neo4j
      - redis
    restart: unless-stopped

  celery_worker:
    image: landsoftdocker/clms-fastapi:latest
    container_name: contract-celery
    <<: *contract-net
    shm_size: "4g"
    gpus: all
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      <<: *fastapi-common-env
      CUDA_VISIBLE_DEVICES: "0"
    volumes:
      - /data/models/.hf-cache:/models:rw
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  nuxt:
    image: landsoftdocker/clms-nuxt:latest
    container_name: contract-nuxt
    <<: *contract-net
    environment:
      NUXT_PUBLIC_API_BASE: "/api"
      NITRO_HOST: "0.0.0.0"
      NITRO_PORT: "3000"
      PORT: "3000"
    depends_on:
      - fastapi
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    container_name: contract-gateway
    <<: *contract-net
    volumes:
      - /data/clms/infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /data/clms/infra/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "92:80"
    depends_on:
      - nuxt
      - fastapi
    restart: unless-stopped

volumes:
  contract_etcd_data:
    external: true
  contract_milvus_data:
    external: true
  contract_minio_data:
    external: true
  contract_postgres_data:
    external: true
  contract_redis_data:
    external: true
  contract_neo4j_data:
    external: true
  contract_neo4j_logs:
    external: true
  contract_neo4j_plugins:
    external: true

networks:
  contract-net:
    external: true
