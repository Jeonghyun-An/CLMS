version: "3.9"

x-contract-net: &contract-net
  networks:
    - contract-net

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.0
    container_name: contract-etcd
    environment:
      ETCD_DATA_DIR: "/etcd"
      ETCD_AUTO_COMPACTION_RETENTION: "1"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
      ETCD_ENABLE_V2: "true"
      ETCD_LOG_LEVEL: "info"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_PEER_URLS: "http://0.0.0.0:2380"
      ETCD_INITIAL_ADVERTISE_PEER_URLS: "http://etcd:2380"
      ETCD_INITIAL_CLUSTER: "default=http://etcd:2380"
      ETCD_NAME: "default"
      ETCDCTL_API: "3"
    volumes:
      - contract_etcd_data:/etcd
    <<: *contract-net
    healthcheck:
      test:
        [
          "CMD",
          "etcdctl",
          "endpoint",
          "health",
          "--endpoints=http://127.0.0.1:2379",
        ]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: contract-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - contract_minio_data:/data
    ports:
      - "21000:9000" # library:19000 / kormem:20000
      - "21001:9001"
    <<: *contract-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: contract-minio-init
    <<: *contract-net
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: "contract-bucket"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY} &&
      mc mb -p myminio/$${MINIO_BUCKET} || true &&
      mc anonymous set none myminio/$${MINIO_BUCKET} || true &&
      echo '[minio-init] bucket ensured: ' $${MINIO_BUCKET}
      "
    restart: "no"

  milvus:
    image: milvusdb/milvus:v2.4.6
    container_name: contract-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: "etcd:2379"
      MINIO_ADDRESS: "minio:9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_NAME: "contract-bucket"
    volumes:
      - contract_milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    <<: *contract-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 300s
    restart: unless-stopped

  # ── vLLM ─────────────────────────────────────
  # library(18080) / kormem(18082) 공유 가능
  # 이 프로젝트 독립 실행 시만 주석 해제
  # vllm:
  #   image: vllm/vllm-openai:latest-cu130
  #   container_name: contract-vllm
  #   <<: *contract-net
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: ["gpu"]
  #   shm_size: "16g"
  #   environment:
  #     HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_TOKEN}
  #     HF_TOKEN: ${HUGGINGFACE_TOKEN}
  #     HF_HOME: "/models"
  #     CUDA_VISIBLE_DEVICES: "0"
  #     NVIDIA_VISIBLE_DEVICES: "0"
  #     NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
  #     TRANSFORMERS_OFFLINE: "0"
  #     VLLM_WORKER_MULTIPROC_METHOD: "spawn"
  #   volumes:
  #     - /data/models/.hf-cache:/models:rw
  #   command:
  #     - ${VLLM_MODEL:-Qwen/Qwen2.5-14B-Instruct}
  #     - --served-model-name
  #     - ${VLLM_SERVED_NAME:-qwen2.5-14b}
  #     - --download-dir
  #     - /models
  #     - --max-model-len
  #     - "16384"
  #     - --dtype
  #     - bfloat16
  #     - --gpu-memory-utilization
  #     - "0.25"
  #     - --max-num-seqs
  #     - "4"
  #     - --host
  #     - "0.0.0.0"
  #     - --port
  #     - "8000"
  #   ports:
  #     - "18083:8000"   # library:18080 / kormem:18082
  #   healthcheck:
  #     test: ["CMD","curl","-fsS","http://127.0.0.1:8000/v1/models"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 40
  #     start_period: 600s
  #   restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: contract-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-contract_review}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "15432:5432"
    volumes:
      - contract_postgres_data:/var/lib/postgresql/data
    <<: *contract-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: contract-redis
    ports:
      - "16379:6379"
    volumes:
      - contract_redis_data:/data
    <<: *contract-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26
    container_name: contract-neo4j
    <<: *contract-net
    restart: unless-stopped
    ports:
      - "7475:7474" # library: 7474
      - "7688:7687" # library: 7687
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password123}
      NEO4J_dbms_security_auth__enabled: "true"
      NEO4J_dbms_memory_pagecache_size: 1G
      NEO4J_dbms_memory_heap_initial__size: 1G
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_bolt_advertised__address: neo4j:7687
      NEO4J_server_http_advertised__address: neo4j:7474
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - contract_neo4j_data:/data
      - contract_neo4j_logs:/logs
      - contract_neo4j_plugins:/plugins
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-password123} 'RETURN 1' || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  fastapi:
    image: landsoftdocker/clms-fastapi:latest
    container_name: contract-fastapi
    <<: *contract-net
    shm_size: "4g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    environment:
      IS_DOCKER: "true"
      PYTHONUNBUFFERED: "1"
      CUDA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"

      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-contract_review}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}

      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: "false"
      MINIO_BUCKET: "contract-bucket"

      MILVUS_HOST: "milvus"
      MILVUS_PORT: "19530"
      MILVUS_COLLECTION: "contract_docs"

      REDIS_HOST: "redis"
      REDIS_PORT: "6379"

      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password123}

      # vLLM 공유 시 → http://host.docker.internal:18080/v1
      # 독립 vLLM 시  → http://vllm:8000/v1
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://host.docker.internal:18080/v1}
      VLLM_MODEL: ${VLLM_SERVED_NAME:-gemma-3-12b}

      EMBEDDING_MODEL_NAME: "BAAI/bge-m3"
      EMBEDDING_BATCH_SIZE: "32"
      EMBEDDING_MAX_LENGTH: "512"

      PADDLEOCR_MODEL_DIR: "/models/paddleocr"
    volumes:
      - /data/models/.hf-cache:/models:rw # 기존 프로젝트와 모델 캐시 공유
    ports:
      - "18002:8000" # library:18000 / kormem:18001
    depends_on:
      postgres:
        condition: service_healthy
      milvus:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  celery_worker:
    image: landsoftdocker/clms-fastapi:latest
    container_name: contract-celery
    <<: *contract-net
    shm_size: "4g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      IS_DOCKER: "true"
      PYTHONUNBUFFERED: "1"
      CUDA_VISIBLE_DEVICES: "0"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-contract_review}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      PADDLEOCR_MODEL_DIR: "/models/paddleocr"
      VLLM_BASE_URL: "http://host.docker.internal:18080/v1"
      VLLM_MODEL: "gemma-3-12b"
    volumes:
      - /data/models/.hf-cache:/models:rw
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nuxt:
    image: landsoftdocker/clms-nuxt:latest
    container_name: contract-nuxt
    <<: *contract-net
    environment:
      NUXT_PUBLIC_API_BASE: "/api"
      NITRO_HOST: "0.0.0.0"
      NITRO_PORT: "3000"
      PORT: "3000"
    depends_on:
      fastapi:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    image: nginx:alpine
    container_name: contract-gateway
    <<: *contract-net
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "92:80" # library:90 / kormem:91
    depends_on:
      - nuxt
      - fastapi
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  contract_etcd_data:
    external: true
    name: contract_etcd_data
  contract_milvus_data:
    external: true
    name: contract_milvus_data
  contract_minio_data:
    external: true
    name: contract_minio_data
  contract_postgres_data:
    external: true
    name: contract_postgres_data
  contract_redis_data:
    external: true
    name: contract_redis_data
  contract_neo4j_data:
    external: true
    name: contract_neo4j_data
  contract_neo4j_logs:
    external: true
    name: contract_neo4j_logs
  contract_neo4j_plugins:
    external: true
    name: contract_neo4j_plugins

networks:
  contract-net:
    external: true
    name: contract-net
